<footer
  class="flex flex-col items-center justify-center bg-white px-5 py-[clamp(40px,8vw,72px)] text-center font-sans"
>
  <!-- Título -->
  <h3
    class="mb-[clamp(18px,2.5vw,26px)] font-garamond text-[clamp(15px,1.7vw,19px)] font-bold tracking-[0.16em] text-[#111]"
  >
    FOLLOW US
  </h3>

  <!-- Redes sociales -->
  <div
    class="mb-[clamp(28px,4.5vw,42px)] flex items-center justify-center gap-[clamp(12px,1.6vw,18px)]"
  >
    <!-- Spotify (círculo) -->
    <a
      [href]="spotifyUrl"
      target="_blank"
      rel="noopener"
      aria-label="Spotify"
      class="flex h-[clamp(34px,4vw,40px)] w-[clamp(34px,4vw,40px)] items-center justify-center rounded-full bg-[#0b0b0b] text-white transition-opacity duration-200 hover:opacity-80"
    >
      <svg
        class="h-[clamp(18px,2.2vw,22px)] w-[clamp(18px,2.2vw,22px)]"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.299.421-1.02.599-1.56.3z"
        />
      </svg>
    </a>

    <!-- YouTube (rectángulo redondeado) -->
    <a
      [href]="youtubeUrl"
      target="_blank"
      rel="noopener"
      aria-label="YouTube"
      class="flex h-[clamp(30px,3.5vw,34px)] w-[clamp(42px,5vw,48px)] items-center justify-center rounded-[9px] bg-[#0b0b0b] text-white transition-opacity duration-200 hover:opacity-80"
    >
      <svg
        class="h-[clamp(16px,2vw,20px)] w-[clamp(16px,2vw,20px)]"
        viewBox="0 0 24 24"
        fill="currentColor"
        aria-hidden="true"
      >
        <path
          d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
        />
      </svg>
    </a>
  </div>

  <!-- Copyright / enlaces legales -->
  <p class="m-0 text-[clamp(12px,1.3vw,14px)] tracking-[0.01em] text-[#3d3d3d]">
    All rights reserved
    <span class="mx-1.5">&bull;</span>
    <a href="#" class="transition-colors hover:text-[#111]">Privacy Policy</a>
    <span class="mx-1.5">&bull;</span>
    <a href="#" class="transition-colors hover:text-[#111]">Cookie Preferences</a>
  </p>
</footer>
