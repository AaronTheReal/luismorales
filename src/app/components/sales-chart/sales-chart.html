<section class="h-full rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
  <!-- Cabecera -->
  <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <h2 class="text-base font-semibold text-slate-900">Resumen de ventas</h2>
      <p class="mt-1 text-sm text-slate-500">
        Total del periodo ·
        <span class="font-semibold text-slate-900">{{ total() }}</span>
      </p>
    </div>

    <!-- Selector de rango -->
    <div class="inline-flex rounded-lg border border-slate-200 bg-slate-50 p-0.5">
      @for (range of ranges; track range) {
        <button
          type="button"
          (click)="setRange(range)"
          [class]="
            activeRange() === range
              ? 'rounded-md bg-white px-3 py-1.5 text-xs font-semibold text-brand-700 shadow-sm'
              : 'rounded-md px-3 py-1.5 text-xs font-medium text-slate-500 transition hover:text-slate-800'
          "
        >
          {{ range }}
        </button>
      }
    </div>
  </div>

  <!-- Gráfico de barras -->
  <div class="mt-6 flex h-56 items-end gap-2 sm:gap-3">
    @for (item of data(); track item.month) {
      <div class="group flex h-full flex-1 flex-col items-center justify-end gap-2">
        <div
          class="relative flex w-full items-end justify-center rounded-t-lg bg-gradient-to-t from-brand-500 to-brand-400 transition-all duration-300 hover:from-brand-600 hover:to-brand-500"
          [style.height.%]="barHeight(item.value)"
          [title]="tooltip(item)"
        >
          <span
            class="pointer-events-none absolute -top-7 whitespace-nowrap rounded-md bg-slate-900 px-2 py-1 text-[10px] font-medium text-white opacity-0 transition group-hover:opacity-100"
          >
            {{ tooltip(item) }}
          </span>
        </div>
        <span class="text-xs font-medium text-slate-400">{{ item.month }}</span>
      </div>
    }
  </div>
</section>
