<header
  class="flex flex-nowrap items-center justify-between gap-6 px-[clamp(20px,5vw,56px)] py-[22px]"
>
  <!-- Logo -->
  <a
    href="#"
    class="flex-none whitespace-nowrap font-cormorant text-[clamp(13px,1.5vw,16px)] font-semibold tracking-[0.14em] text-[#111] no-underline"
  >
    LUIS MORALES JR.
  </a>

  <!-- Navegación central -->
  <nav class="flex flex-1 items-center justify-center gap-[clamp(28px,5vw,64px)]">
    @for (link of links(); track link) {
      <a
        href="#"
        class="font-cormorant text-[clamp(12px,1.3vw,15px)] font-medium tracking-[0.18em] text-[#1a1a1a] no-underline transition-opacity duration-200 hover:opacity-50"
      >
        {{ link }}
      </a>
    }
  </nav>

  <!-- Buscador -->
  <button
    type="button"
    aria-label="Buscar"
    class="flex h-5 w-5 flex-none items-center justify-center text-[#111] transition-opacity duration-200 hover:opacity-50"
  >
    <svg
      class="h-[18px] w-[18px]"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="7" />
      <path d="m21 21-4.3-4.3" />
    </svg>
  </button>
</header>
