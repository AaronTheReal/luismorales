<section class="flex h-full flex-col rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
  <div class="flex items-center justify-between">
    <h2 class="text-base font-semibold text-slate-900">Actividad reciente</h2>
    <button
      type="button"
      class="text-xs font-semibold text-brand-600 transition hover:text-brand-700"
    >
      Ver todo
    </button>
  </div>

  <ul class="mt-4 flex-1 space-y-1">
    @for (item of activities(); track item.title; let last = $last) {
      <li class="relative flex gap-3 pb-4">
        <!-- Línea vertical del timeline -->
        @if (!last) {
          <span class="absolute left-5 top-11 -ml-px h-[calc(100%-1.75rem)] w-px bg-slate-200"></span>
        }

        <span
          [class]="
            'flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-xs font-bold ' +
            item.avatarClasses
          "
        >
          {{ item.initials }}
        </span>

        <div class="min-w-0 flex-1 pt-0.5">
          <p class="text-sm text-slate-700">
            <span class="font-semibold text-slate-900">{{ item.title }}</span>
            {{ item.detail }}
          </p>
          <div class="mt-1 flex items-center gap-2">
            <span [class]="'rounded-full px-2 py-0.5 text-[11px] font-semibold ' + item.statusClasses">
              {{ item.status }}
            </span>
            <span class="text-xs text-slate-400">{{ item.time }}</span>
          </div>
        </div>
      </li>
    }
  </ul>
</section>
