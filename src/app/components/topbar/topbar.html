<header
  class="sticky top-0 z-30 flex h-16 items-center gap-3 border-b border-slate-200 bg-white/80 px-4 backdrop-blur sm:px-6 lg:px-8"
>
  <!-- Botón de menú (solo móvil) -->
  <button
    type="button"
    class="flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-100 lg:hidden"
    aria-label="Abrir menú"
  >
    <svg
      class="h-6 w-6"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Buscador -->
  <div class="relative hidden max-w-md flex-1 sm:block">
    <svg
      class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="11" cy="11" r="7" />
      <path d="m21 21-4.3-4.3" />
    </svg>
    <input
      type="search"
      placeholder="Buscar pedidos, clientes, productos…"
      class="w-full rounded-lg border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-4 text-sm text-slate-700 placeholder:text-slate-400 focus:border-brand-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/30"
    />
  </div>

  <!-- Acciones a la derecha -->
  <div class="ml-auto flex items-center gap-1 sm:gap-2">
    <!-- Mensajes -->
    <button
      type="button"
      class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-100"
      aria-label="Mensajes"
    >
      <svg
        class="h-5 w-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.7"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 11.5a8.38 8.38 0 0 1-9 8.32L3 21l1.18-4.5A8.38 8.38 0 1 1 21 11.5Z" />
      </svg>
    </button>

    <!-- Notificaciones -->
    <button
      type="button"
      class="relative flex h-10 w-10 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-100"
      aria-label="Notificaciones"
    >
      <svg
        class="h-5 w-5"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.7"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
        <path d="M13.7 21a2 2 0 0 1-3.4 0" />
      </svg>
      <span
        class="absolute right-2 top-2 h-2 w-2 rounded-full bg-rose-500 ring-2 ring-white"
      ></span>
    </button>

    <div class="mx-1 hidden h-8 w-px bg-slate-200 sm:block"></div>

    <!-- Perfil -->
    <button
      type="button"
      class="flex items-center gap-2 rounded-lg p-1 pr-2 transition hover:bg-slate-100"
    >
      <span
        class="flex h-9 w-9 items-center justify-center rounded-full bg-brand-600 text-sm font-semibold text-white"
      >
        LM
      </span>
      <span class="hidden text-left leading-tight sm:block">
        <span class="block text-sm font-semibold text-slate-900">Luis M. JR</span>
        <span class="block text-xs text-slate-400">Administrador</span>
      </span>
      <svg
        class="hidden h-4 w-4 text-slate-400 sm:block"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="m6 9 6 6 6-6" />
      </svg>
    </button>
  </div>
</header>
